name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate no SyntaxWarnings
        run: |
          python -W error::SyntaxWarning -c "
          import ast, pathlib
          files = list(pathlib.Path('api').rglob('*.py'))
          for f in files:
              compile(f.read_text(encoding='utf-8'), str(f), 'exec')
          print(f'OK: {len(files)} archivos compilan sin warnings')
          "

      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest tests/ -v --tb=short --color=yes
