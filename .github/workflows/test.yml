name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # Node para el guardián de JS de plantillas (test_template_js_valido.py):
      # node --check sobre el JS inline renderizado → atrapa errores de sintaxis
      # (incl. \n/\' crudos que rompen una cadena) antes de que lleguen al navegador.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate no SyntaxWarnings
        run: |
          python -W error::SyntaxWarning -c "
          import ast, pathlib
          files = list(pathlib.Path('api').rglob('*.py'))
          for f in files:
              compile(f.read_text(encoding='utf-8'), str(f), 'exec')
          print(f'OK: {len(files)} archivos compilan sin warnings')
          "

      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          pytest tests/ -v --tb=short --color=yes

  # Paridad PostgreSQL · corre los golden paths contra un PG real (igual que
  # producción en Render). Caza el drift SQLite↔PG (causa #1 de reprocesos:
  # tipos de columna, columnas no agrupadas, date() en DML, columnas de
  # migraciones faltantes). Ver .claude/CERO_ERROR.md y SESSION_LOG.
  test-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements-dev.txt ya incluye psycopg[binary] (driver PG) vía -r requirements.txt
          pip install -r requirements-dev.txt
          # cliente postgres para pg_dump (lo usa api/backup.py)
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run golden paths against PostgreSQL
        env:
          PYTHONUNBUFFERED: "1"
          EOS_DB_BACKEND: postgres
          PGHOST: "127.0.0.1"
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: eos_test
          PG_DUMP: pg_dump
        run: |
          pytest tests/test_golden_paths.py -q --tb=short --color=yes
