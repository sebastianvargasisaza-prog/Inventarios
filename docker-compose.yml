version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/var/data
    environment:
      - SECRET_KEY=dev-secret-change-in-production
      - WEB_CONCURRENCY=2
      # Credenciales opcionales — copiar .env.example a .env y completar
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
    driver: local
